<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Interview - MockPro</title>
    <link rel="stylesheet" href="styles.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">MockPro</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="selection.html">Start</a>
            <a href="#">Sign In</a>
        </nav>
    </header>

    <div class="selection-container glass-container">
        <h1>Select Your Interview Focus</h1>

        <div class="form-group">
            <label for="categorySelect">1. Choose a Category</label>
            <select id="categorySelect">
                <option value="" disabled selected>-- Select a Career Field --</option>
                <option value="SoftwareEngineering">Software Engineering</option>
                <option value="DataScience">Data Science</option>
                <option value="Marketing">Marketing</option>
                <option value="ProductManagement">Product Management</option>
            </select>
        </div>

        <div class="form-group">
            <label for="focusSelect">2. Select a Specific Focus Area</label>
            <select id="focusSelect" disabled>
                <option value="" disabled selected>-- Select a Focus Area --</option>
                </select>
        </div>

        <button id="proceedButton" class="cta-button" disabled>Proceed to Setup</button>
    </div>

    <footer class="footer">
        <p>&copy; 2025 MockPro Platform. All rights reserved.</p>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <span>|</span>
            <a href="#">Terms of Service</a>
        </div>
    </footer>

    <script src="selection.js"></script>
</body>
</html>
